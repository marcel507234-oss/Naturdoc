<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naturheil-Lexikon</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #d9e2db; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
        }
        #app { 
            background-color: #e6f2e9; 
            width: 100%; 
            max-width: 400px; 
            min-height: 100vh; 
            position: relative; 
            box-shadow: 0 0 15px rgba(0,0,0,0.2); 
            display: flex;
            flex-direction: column;
        }
        header { 
            background-color: #3b5f43; 
            padding: 25px 20px 20px 20px; 
            color: white; 
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }
        h1 { 
            font-size: 1.1rem; 
            margin: 0 0 15px 0; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .logo-icon {
            background: white;
            color: #3b5f43;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }
        .search-container { 
            position: relative; 
            width: 100%; 
        }
        input { 
            width: 100%; 
            padding: 14px 40px 14px 15px; 
            border: none; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 0.95rem; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input:focus {
            outline: 2px solid #2e4a34;
        }
        button { 
            position: absolute; 
            right: 10px; 
            top: 50%; 
            transform: translateY(-50%);
            background: none; 
            border: none; 
            font-size: 1.3rem; 
            cursor: pointer; 
            color: #555;
        }
        main { 
            padding: 20px; 
            flex-grow: 1;
            padding-bottom: 50px; 
        }
        .card { 
            background: white; 
            padding: 18px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.06); 
        }
        .card h2 { 
            color: #3b5f43; 
            margin: 0 0 10px 0; 
            font-size: 1.2rem; 
        }
        .card p { 
            margin: 5px 0 8px 0; 
            font-size: 0.95rem; 
            line-height: 1.4; 
            color: #222;
        }
        .card strong { 
            color: #000; 
            font-size: 0.9rem;
            display: block;
            margin-bottom: 2px;
        }
        footer { 
            text-align: center; 
            font-size: 0.65rem; 
            color: #555; 
            padding: 15px;
        }
        #status { 
            text-align: center; 
            padding: 20px; 
            color: #3b5f43;
            font-weight: bold;
            display: none; 
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1><div class="logo-icon">🌿</div> NATURHEIL-LEXIKON</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Symptom oder Krankheit eingeben..." onkeypress="if(event.key === 'Enter') search()">
                <button onclick="search()">🔍</button>
            </div>
        </header>
        
        <main id="results"></main>
        
        <div id="status">Suche läuft...</div>
        
        <footer>*Information dient der Aufklärung, ersetzt keinen Arztbesuch.</footer>
    </div>

    <script>
        const API_KEY = "DEIN_ECHTER_API_KEY_HIER";
        const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const SYSTEM_INSTRUCTION = `Du bist ein Lexikon für natürliche Heilmethoden. Regeln:
1. Nenne ausschließlich Mittel aus dem alternativmedizinischen Bereich (beschränkt auf 100 vordefinierte Mittel), die eingenommen oder aufgetragen werden.
2. Keine Einleitungen, keine Schlussworte, keine medizinischen Disclaimer, keine Arztverweise.
3. Format exakt: [Mittel]: [Wirkweise]. [Grund der Wirkung].
4. Wenn das Symptom Pilze oder Entzündungen betrifft, nenne 'Reinöl-Mischung' zwingend als erstes Mittel.
5. Definition 'Reinöl-Mischung': Ätherisches Ölgemisch der Marke Orevax. Zusammensetzung: Thymianöl (28,17%), Rosmarinöl (28,17%), Oreganoöl (28,17%), Weihrauchöl (14,085%), Kamillenöl blau (1,408%). Vordefinierte Wirkweise: Hemmt Entzündungsprozesse und zerstört Erregerstrukturen bei Pilzen und Bakterien. Vordefinierter Grund: Der Wirkstoffkomplex aus Carvacrol, Thymol, Boswelliasäuren und Chamazulen greift Zellmembranen von Mikroorganismen an und blockiert lokale Entzündungsmediatoren.
6. Falls keine naturheilkundliche Antwort möglich ist, antworte exakt mit: 'Für dieses Symptom ist keine valide naturheilkundliche Anwendung hinterlegt.'`;

        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            
            resultsDiv.innerHTML = '';
            statusDiv.style.display = 'block';
            statusDiv.innerText = 'Suche läuft...';

            const payload = {
                "systemInstruction": { "parts": [{ "text": SYSTEM_INSTRUCTION }] },
                "contents": [{ "role": "user", "parts": [{ "text": query }] }]
            };

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                statusDiv.style.display = 'none';

                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    const text = data.candidates[0].content.parts[0].text.trim();
                    
                    if(text.includes("keine valide naturheilkundliche Anwendung hinterlegt")) {
                        resultsDiv.innerHTML = `<div class="card"><p>${text}</p></div>`;
                        return;
                    }
                    
                    const lines = text.split('\n').filter(line => line.trim() !== '');
                    
                    lines.forEach(line => {
                        const match = line.match(/^(.*?):\s*(.*?)\.\s*(.*)$/);
                        if (match) {
                            resultsDiv.innerHTML += `
                                <div class="card">
                                    <h2>${match[1].trim()}</h2>
                                    <p><strong>Wirkweise:</strong><br>${match[2].trim()}.</p>
                                    <p><strong>Grund:</strong><br>${match[3].trim()}</p>
                                </div>
                            `;
                        } else {
                            resultsDiv.innerHTML += `<div class="card"><p>${line}</p></div>`;
                        }
                    });
                } else {
                    resultsDiv.innerHTML = `<div class="card"><p>Keine gültige Antwort erhalten.</p></div>`;
                }
            } catch (error) {
                statusDiv.style.display = 'none';
                resultsDiv.innerHTML = `<div class="card"><p>Fehler bei der Verbindung zur API.</p></div>`;
            }
        }
    </script>
</body>
</html>
